<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROV AR Model</title>

  <!-- Load model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      flex-direction: column;
    }

    model-viewer {
      width: 100%;
      height: 80vh;
      margin-top: 20px;
      display: block;
    }

    /* Move AR button upward */
    model-viewer::part(ar-button) {
      bottom: 40px;   /* adjust this value to move it higher or lower */
      right: 20px;
      transform: scale(1.2); /* optional: make button larger */
    }
  </style>
</head>
