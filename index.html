<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROV AR Model</title>

  <!-- Load model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    model-viewer {
  width: 100%;
  height: 80vh; /* or 70vh */
  margin-top: 20px;
}

  </style>
</head>

<body>
  <model-viewer
    src="ROV.glb"
    ios-src="ROV.usdz"
    ar
    ar-modes="quick-look webxr scene-viewer"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral">
  </model-viewer>
</body>
</html>
