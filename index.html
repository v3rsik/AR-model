<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AR Model</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
      }
      model-viewer {
        width: 100%;
        max-width: 600px;
        height: 80vh;
      }
    </style>
  </head>
  <body>
    <model-viewer
      src="model.glb"
      ios-src="model.usdz"
      ar
      ar-modes="quick-look webxr scene-viewer"
      camera-controls
      auto-rotate
      environment-image="neutral"
      poster=""
      shadow-intensity="1">
    </model-viewer>
  </body>
</html>
